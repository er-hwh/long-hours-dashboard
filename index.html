<!DOCTYPE html>
<html>
<head>
  <title>Long Hours Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
  <h3 class="mb-4">🚆 Long Hours Sectionwise</h3>

  <!-- FILTERS -->
  <div class="row mb-3">
    <div class="col-md-3">
      <input type="date" id="fromDate" class="form-control">
    </div>
    <div class="col-md-3">
      <input type="date" id="toDate" class="form-control">
    </div>
    <div class="col-md-3">
      <select id="categoryFilter" class="form-control">
        <option value="">All Category</option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="text" id="sectionFilter" class="form-control" placeholder="Search Section">
    </div>
  </div>

  <button class="btn btn-primary mb-3" onclick="loadData()">Load Data</button>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Category</th>
          <th>Section</th>
          <th>NOS</th>
          <th>%</th>
          <th>HWH DIV DUTY</th>
          <th>OTH DIV DUTY</th>
          <th>SIGN ON - DEP</th>
          <th>WHEEL MOVEMENT</th>
          <th>ARR - SIGN OFF</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx-y74zeX0hjFWt6x07SWiNONOAG8rJxVrK8qXdqArZ_583v1K6LYwR3T2kbqA4eEVarA/exec";

let fullData = [];

async function loadData() {
  const res = await fetch(API_URL);
  fullData = await res.json();

  populateCategory();
  applyFilter();
}

function populateCategory() {
  const categories = [...new Set(fullData.map(d => d.CATEGORY))];
  const select = document.getElementById("categoryFilter");

  select.innerHTML = '<option value="">All Category</option>';
  categories.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

function applyFilter() {
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;
  const cat = document.getElementById("categoryFilter").value;
  const section = document.getElementById("sectionFilter").value.toLowerCase();

  const filtered = fullData.filter(d => {

    if (from && d["Sign Off Date"] < from) return false;
    if (to && d["Sign Off Date"] > to) return false;
    if (cat && d.CATEGORY !== cat) return false;
    if (section && !d.SECTION.toLowerCase().includes(section)) return false;

    return true;
  });

  renderTable(filtered);
}

function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td>${d.CATEGORY}</td>
        <td>${d.SECTION}</td>
        <td>${d.NOS}</td>
        <td>${(d["%AGE"] * 100).toFixed(2)}%</td>
        <td>${d["HWH DIV DUTY"]}</td>
        <td>${d["OTH DIV DUTY"]}</td>
        <td>${d["SIGN ON - DEP"]}</td>
        <td>${d["WHEEL MOVEMENT"]}</td>
        <td>${d["ARR - SIGN OFF"]}</td>
        <td>${d["Sign Off Date"]}</td>
      </tr>
    `;
  });
}

// 🔥 auto filter on change
document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("change", applyFilter);
});
</script>

</body>
</html>
